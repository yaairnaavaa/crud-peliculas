<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CRUD de Películas</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>CRUD de Películas</h1>
    <form id="formulario">
        <input type="hidden" id="id">
        <input type="text" id="titulo" placeholder="Título" required>
        <input type="text" id="director" placeholder="Director" required>
        <input type="number" id="año" placeholder="Año" required>
        <button type="submit">Guardar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Director</th>
                <th>Año</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaPeliculas"></tbody>
    </table>
    <script src="script.js"></script>
</body>

</html>
